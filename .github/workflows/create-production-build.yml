name: Expo Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout the repo
      - name: Checkout repository
        uses: actions/checkout@v4

      # Step 2: Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      # Step 3: Install project dependencies (ignore peer conflicts)
      - name: Install dependencies
        run: npm install --legacy-peer-deps

      # Step 4: Install EAS CLI globally
      - name: Install EAS CLI
        run: npm install -g eas-cli

      # Step 5: Run EAS build for Android & iOS
      - name: Run EAS build
        run: eas build --platform all --non-interactive
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}       # Replace with your Expo token secret
          EAS_PROJECT_ID: ${{ secrets.EAS_PROJECT_ID }} # Replace with your project ID secret
